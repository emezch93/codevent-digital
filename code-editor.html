<style>
  :root{
    --bg:#0d0f1a;
    --panel:#141828;
    --panel-2:#0f1220;
    --gutter:#10131f;
    --border:#242a42;
    --purple:#5b4cff;
    --green:#00e5a0;
    --text:#e9ebf5;
    --text-dim:#8a90ad;
    --danger:#ff5c7a;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(91,76,255,0.16), transparent 60%),
      radial-gradient(900px 500px at 105% 10%, rgba(0,229,160,0.10), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:'Plus Jakarta Sans', sans-serif;
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }

  header{
    display:flex;align-items:center;justify-content:space-between;gap:1rem;
    padding:0.9rem 1.5rem;
    border-bottom:1px solid var(--border);
    background:rgba(13,15,26,0.9);
    backdrop-filter:blur(10px);
    position:sticky;top:0;z-index:20;
    flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:0.6rem;}
  .brand-mark{
    width:34px;height:34px;border-radius:9px;
    display:block;
    box-shadow:0 4px 14px rgba(91,76,255,0.35);
  }
  .brand-name{font-family:'DM Serif Display', serif;font-size:1.25rem;}
  .brand-sub{font-size:0.72rem;color:var(--text-dim);font-family:'DM Mono',monospace;margin-top:-2px;}

  .status{display:flex;align-items:center;gap:0.5rem;font-family:'DM Mono', monospace;font-size:0.75rem;color:var(--text-dim);}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--text-dim);transition:all 0.25s ease;}
  .status-dot.live{background:var(--green);box-shadow:0 0 0 3px rgba(0,229,160,0.18);animation:pulse 1.6s ease-in-out infinite;}
  .status-dot.error{background:var(--danger);box-shadow:0 0 0 3px rgba(255,92,122,0.18);}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(0,229,160,0.18);}50%{box-shadow:0 0 0 6px rgba(0,229,160,0.05);}}

  .toolbar{
    display:flex;align-items:center;gap:0.5rem;
    padding:0.6rem 1.5rem;border-bottom:1px solid var(--border);
    flex-wrap:wrap;
  }
  .tabs{display:flex;gap:0.35rem;background:var(--panel-2);padding:4px;border-radius:9px;border:1px solid var(--border);}
  .tab{
    font-family:'DM Mono', monospace;font-size:0.8rem;padding:0.4rem 0.85rem;
    border:none;background:transparent;color:var(--text-dim);border-radius:6px;
    cursor:pointer;transition:all 0.2s ease;
  }
  .tab.active{background:var(--purple);color:#fff;}
  .tab:hover:not(.active){color:var(--text);background:rgba(255,255,255,0.05);}

  .spacer{flex:1;}

  .toolbar-btn{
    display:inline-flex;align-items:center;gap:0.4rem;
    font-family:'Plus Jakarta Sans', sans-serif;font-size:0.8rem;font-weight:600;
    padding:0.5rem 0.9rem;border-radius:8px;border:1px solid var(--border);
    background:var(--panel);color:var(--text);cursor:pointer;transition:all 0.2s ease;
    white-space:nowrap;
  }
  .toolbar-btn:hover{border-color:var(--purple);color:#fff;}
  .toolbar-btn.primary{background:linear-gradient(135deg, var(--purple), #7a6bff);border:none;}
  .toolbar-btn.primary:hover{filter:brightness(1.08);}
  .toolbar-btn.accent{border-color:var(--green);color:var(--green);}

  select.tpl{
    font-family:'DM Mono', monospace;font-size:0.78rem;
    background:var(--panel);color:var(--text);border:1px solid var(--border);
    border-radius:8px;padding:0.5rem 0.6rem;
  }

  label.switch{display:flex;align-items:center;gap:0.4rem;font-size:0.78rem;color:var(--text-dim);font-family:'DM Mono', monospace;cursor:pointer;user-select:none;}
  .switch input{accent-color:var(--green);width:14px;height:14px;}

  main{
    flex:1;display:flex;padding:1rem 1.5rem 1.5rem;gap:1rem;
    max-width:1600px;margin:0 auto;width:100%;
  }
  .editor-col{flex:1 1 50%;display:flex;flex-direction:column;}
  .pane{
    flex:1;display:flex;flex-direction:column;min-height:420px;
    border:1px solid var(--border);border-radius:var(--radius);
    overflow:hidden;background:var(--panel-2);
  }
  .pane-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:0.5rem 0.9rem;border-bottom:1px solid var(--border);
    font-family:'DM Mono', monospace;font-size:0.72rem;color:var(--text-dim);
    letter-spacing:0.04em;text-transform:uppercase;
  }

  .editor-body{flex:1;display:flex;position:relative;overflow:hidden;}
  .editor-instance{display:none;flex:1;position:relative;overflow:hidden;}
  .editor-instance.active{display:flex;}

  .gutter{
    width:44px;flex-shrink:0;background:var(--gutter);
    color:#4a5072;font-family:'DM Mono', monospace;font-size:0.85rem;line-height:1.55;
    padding:12px 0;text-align:right;overflow:hidden;user-select:none;
    border-right:1px solid var(--border);
  }
  .gutter div{padding-right:10px;}

  textarea.code-input{
    flex:1;resize:none;border:none;outline:none;
    background:transparent;color:var(--text);
    font-family:'DM Mono', monospace;font-size:0.85rem;line-height:1.55;
    padding:12px 14px;white-space:pre;overflow:auto;
    tab-size:2;
  }

  .preview-pane{position:relative;}
  iframe#preview{flex:1;width:100%;border:none;background:#fff;}

  .console{
    border-top:1px solid var(--border);background:#0a0c16;
    max-height:150px;min-height:38px;overflow-y:auto;
    font-family:'DM Mono', monospace;font-size:0.76rem;
  }
  .console-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:0.4rem 0.9rem;color:var(--text-dim);text-transform:uppercase;
    letter-spacing:0.04em;font-size:0.68rem;position:sticky;top:0;
    background:#0a0c16;border-bottom:1px solid var(--border);
  }
  .console-body{padding:0.4rem 0.9rem 0.7rem;}
  .console-line{padding:0.15rem 0;border-bottom:1px dashed rgba(255,255,255,0.04);color:var(--text);}
  .console-line.err{color:var(--danger);}
  .console-line.warn{color:#ffcf5c;}
  .console-empty{color:var(--text-dim);font-style:italic;}
  .console-clear{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:0.7rem;font-family:'DM Mono',monospace;}
  .console-clear:hover{color:var(--green);}

  main.preview-only .editor-col{display:none;}
  main.preview-only .preview-pane{flex:1 1 100%;}

  footer{
    text-align:center;padding:1rem;font-family:'DM Mono', monospace;
    font-size:0.72rem;color:var(--text-dim);border-top:1px solid var(--border);
  }

<script>
(() => {
  const PAIRS = { '(': ')', '[': ']', '{': '}', '"': '"', "'": "'", '`': '`' };

  const TEMPLATES = {
    blank: { html:'', css:'', js:'' },
    landing: {
      html: `<section class="hero">\n  <h1>Build something people remember</h1>\n  <p>A starter section for landing pages. Edit freely.</p>\n  <button id="cta">Get started</button>\n</section>`,
      css: `body{font-family:sans-serif;margin:0;background:#0d0f1a;color:#fff;}\n.hero{padding:4rem 2rem;text-align:center;}\n.hero h1{font-size:2rem;margin-bottom:0.5rem;}\n.hero p{color:#9aa;margin-bottom:1.5rem;}\n#cta{padding:0.75rem 1.5rem;border:none;border-radius:8px;background:#5b4cff;color:#fff;cursor:pointer;font-weight:600;}\n#cta:hover{background:#00e5a0;color:#0a0b12;}`,
      js: `document.getElementById('cta').addEventListener('click', () => {\n  console.log('CTA clicked');\n});`
    },
    card: {
      html: `<div class="card">\n  <h3>Card title</h3>\n  <p>Supporting copy for the card component.</p>\n  <a href="#" class="link">Learn more →</a>\n</div>`,
      css: `body{display:flex;justify-content:center;padding:3rem;font-family:sans-serif;background:#f4f4f7;}\n.card{background:#fff;border-radius:12px;padding:1.5rem;box-shadow:0 8px 24px rgba(0,0,0,0.08);max-width:320px;}\n.card h3{margin:0 0 0.5rem;}\n.card .link{color:#5b4cff;text-decoration:none;font-weight:600;}`,
      js: ``
    },
    form: {
      html: `<form id="demoForm">\n  <label>Email <input type="email" id="email" required /></label>\n  <button type="submit">Submit</button>\n  <p id="msg"></p>\n</form>`,
      css: `body{font-family:sans-serif;padding:2rem;}\nform{display:flex;flex-direction:column;gap:0.6rem;max-width:280px;}\ninput{padding:0.5rem;border:1px solid #ccc;border-radius:6px;}\nbutton{padding:0.5rem;border:none;background:#5b4cff;color:#fff;border-radius:6px;cursor:pointer;}\n#msg{font-size:0.85rem;color:#00a97a;}`,
      js: `document.getElementById('demoForm').addEventListener('submit', e => {\n  e.preventDefault();\n  document.getElementById('msg').textContent = 'Submitted: ' + document.getElementById('email').value;\n});`
    },
    loop: {
      html: `<ul id="output"></ul>`,
      css: `body{font-family:sans-serif;padding:2rem;}\n#output{line-height:1.6;}`,
      js: `for (let i = 1; i <= 5; i++) {\n  const li = document.createElement('li');\n  li.textContent = 'Item ' + i;\n  document.getElementById('output').appendChild(li);\n  console.log('rendered item', i);\n}`
    }
  };

  const LANGS = ['html', 'css', 'js'];
  const inputs = {}, gutters = {}, wraps = {};
  LANGS.forEach(l => {
    inputs[l] = document.getElementById('input-' + l);
    gutters[l] = document.getElementById('gutter-' + l);
    wraps[l] = document.getElementById('wrap-' + l);
  });

  const labels = { html:'index.html', css:'style.css', js:'script.js' };
  const tabs = document.querySelectorAll('.tab');
  const paneLabel = document.getElementById('paneLabel');
  const charCount = document.getElementById('charCount');
  let preview = document.getElementById('preview');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const consoleBody = document.getElementById('consoleBody');
  const autoRunToggle = document.getElementById('autoRunToggle');

  let currentLang = 'html';

  inputs.html.value = TEMPLATES.landing.html;
  inputs.css.value = TEMPLATES.landing.css;
  inputs.js.value = TEMPLATES.landing.js;

  function updateGutter(lang){
    const lines = inputs[lang].value.split('\n').length;
    let html = '';
    for (let i = 1; i <= lines; i++) html += '<div>' + i + '</div>';
    gutters[lang].innerHTML = html;
  }
  function syncScroll(lang){
    gutters[lang].scrollTop = inputs[lang].scrollTop;
  }
  LANGS.forEach(lang => {
    updateGutter(lang);
    inputs[lang].addEventListener('scroll', () => syncScroll(lang));
  });

  LANGS.forEach(lang => {
    const ta = inputs[lang];
    ta.addEventListener('keydown', e => {
      const start = ta.selectionStart, end = ta.selectionEnd;

      if (e.key === 'Tab') {
        e.preventDefault();
        if (e.shiftKey) {
          const lineStart = ta.value.lastIndexOf('\n', start - 1) + 1;
          if (ta.value.slice(lineStart, lineStart + 2) === '  ') {
            ta.value = ta.value.slice(0, lineStart) + ta.value.slice(lineStart + 2);
            ta.selectionStart = ta.selectionEnd = Math.max(lineStart, start - 2);
          }
        } else {
          ta.value = ta.value.slice(0, start) + '  ' + ta.value.slice(end);
          ta.selectionStart = ta.selectionEnd = start + 2;
        }
        onEdit(lang);
        return;
      }

      if (e.key === 'Enter') {
        const lineStart = ta.value.lastIndexOf('\n', start - 1) + 1;
        const currentLine = ta.value.slice(lineStart, start);
        const indentMatch = currentLine.match(/^\s*/);
        let indent = indentMatch ? indentMatch[0] : '';
        const prevChar = ta.value[start - 1];
        const nextChar = ta.value[start];
        if (prevChar && PAIRS[prevChar] === nextChar && '{[('.includes(prevChar)) {
          e.preventDefault();
          const inner = '\n' + indent + '  ';
          const closer = '\n' + indent;
          ta.value = ta.value.slice(0, start) + inner + closer + ta.value.slice(end);
          ta.selectionStart = ta.selectionEnd = start + inner.length;
          onEdit(lang);
          return;
        }
        if (indent) {
          e.preventDefault();
          ta.value = ta.value.slice(0, start) + '\n' + indent + ta.value.slice(end);
          ta.selectionStart = ta.selectionEnd = start + 1 + indent.length;
          onEdit(lang);
          return;
        }
        return;
      }

      if (PAIRS[e.key] && start === end) {
        const nextChar = ta.value[start];
        const isQuote = ['"', "'", '`'].includes(e.key);
        if (!isQuote || !nextChar || /[\s)\]}]/.test(nextChar)) {
          e.preventDefault();
          ta.value = ta.value.slice(0, start) + e.key + PAIRS[e.key] + ta.value.slice(end);
          ta.selectionStart = ta.selectionEnd = start + 1;
          onEdit(lang);
          return;
        }
      }

      const closers = [')', ']', '}', '"', "'", '`'];
      if (closers.includes(e.key) && start === end && ta.value[start] === e.key) {
        e.preventDefault();
        ta.selectionStart = ta.selectionEnd = start + 1;
        return;
      }

      if (e.key === 'Backspace' && start === end && start > 0) {
        const before = ta.value[start - 1];
        const after = ta.value[start];
        if (PAIRS[before] === after) {
          e.preventDefault();
          ta.value = ta.value.slice(0, start - 1) + ta.value.slice(start + 1);
          ta.selectionStart = ta.selectionEnd = start - 1;
          onEdit(lang);
        }
      }
    });

    ta.addEventListener('input', () => onEdit(lang));
  });

  function onEdit(lang){
    updateGutter(lang);
    if (lang === currentLang) charCount.textContent = inputs[lang].value.length + ' chars';
    scheduleRun();
  }

  function switchTab(lang){
    currentLang = lang;
    tabs.forEach(t => t.classList.toggle('active', t.dataset.lang === lang));
    LANGS.forEach(l => wraps[l].classList.toggle('active', l === lang));
    paneLabel.textContent = labels[lang];
    charCount.textContent = inputs[lang].value.length + ' chars';
    inputs[lang].focus();
  }
  tabs.forEach(tab => tab.addEventListener('click', () => switchTab(tab.dataset.lang)));

  function setStatus(state){
    statusDot.className = 'status-dot' + (state === 'live' ? ' live' : state === 'error' ? ' error' : '');
    statusText.textContent = state === 'live' ? 'running' : state === 'error' ? 'error' : 'idle';
  }

  let consoleHasContent = false;
  function logToConsole(type, args){
    if (!consoleHasContent) { consoleBody.innerHTML = ''; consoleHasContent = true; }
    const line = document.createElement('div');
    line.className = 'console-line' + (type === 'error' ? ' err' : type === 'warn' ? ' warn' : '');
    const prefix = type === 'error' ? '✕ ' : type === 'warn' ? '! ' : '› ';
    line.textContent = prefix + args.map(a => {
      try { return typeof a === 'object' ? JSON.stringify(a) : String(a); }
      catch(e){ return String(a); }
    }).join(' ');
    consoleBody.appendChild(line);
    consoleBody.parentElement.scrollTop = consoleBody.parentElement.scrollHeight;
  }
  document.getElementById('consoleClear').addEventListener('click', () => {
    consoleBody.innerHTML = '<span class="console-empty">Output from your code will appear here.</span>';
    consoleHasContent = false;
  });
  window.addEventListener('message', e => {
    if (e.data && e.data.__codevent_console) {
      logToConsole(e.data.level, e.data.args);
      if (e.data.level === 'error') setStatus('error');
    }
  });

  function composeDoc(){
    const html = inputs.html.value, css = inputs.css.value, js = inputs.js.value;
    return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>${css}</style>
</head>
<body>
${html}
<script>
(function(){
  function relay(level, args){ try{ parent.postMessage({__codevent_console:true, level:level, args:args}, '*'); }catch(e){} }
  ['log','warn','error','info'].forEach(function(level){
    var orig = console[level];
    console[level] = function(){ relay(level, Array.prototype.slice.call(arguments)); orig && orig.apply(console, arguments); };
  });
  window.onerror = function(message, source, lineno){ relay('error', [message + ' (line ' + lineno + ')']); return true; };
})();
try {
${js}
} catch (e) { console.error(e.message); }
<\/script>
</body>
</html>`;
  }

  let lastPreviewUrl = null;

  function renderPreview(docString){
    // Swap in a fresh iframe on every run and navigate it to a blob: URL.
    // Reusing the same iframe and only reassigning srcdoc is unreliable in
    // sandboxed/nested contexts (some environments silently ignore repeat
    // srcdoc writes). Recreating the element + using a real navigation via
    // a blob URL forces a guaranteed reload every single time.
    const container = preview.parentElement;
    const fresh = document.createElement('iframe');
    fresh.id = 'preview';
    fresh.title = 'Live preview';
    fresh.setAttribute('sandbox', 'allow-scripts allow-modals allow-forms allow-popups');

    const blob = new Blob([docString], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    fresh.src = url;

    container.replaceChild(fresh, preview);
    preview = fresh;

    if (lastPreviewUrl) URL.revokeObjectURL(lastPreviewUrl);
    lastPreviewUrl = url;
  }

  function runCode(){
    try {
      setStatus('live');
      renderPreview(composeDoc());
    } catch (e) {
      setStatus('error');
      logToConsole('error', ['Preview failed to render: ' + e.message]);
    }
  }

  function clearAll(){
    if (!confirm('Clear all code? This cannot be undone.')) return;
    LANGS.forEach(l => { inputs[l].value = ''; updateGutter(l); });
    charCount.textContent = '0 chars';
    consoleBody.innerHTML = '<span class="console-empty">Output from your code will appear here.</span>';
    consoleHasContent = false;
    renderPreview('<!DOCTYPE html><html><head></head><body></body></html>');
    setStatus('idle');
  }

  document.getElementById('runBtn').addEventListener('click', runCode);
  document.getElementById('clearBtn').addEventListener('click', clearAll);
  document.getElementById('openTabBtn').addEventListener('click', () => {
    const w = window.open();
    w.document.open(); w.document.write(composeDoc()); w.document.close();
  });
  document.getElementById('fullscreenBtn').addEventListener('click', function(){
    const ws = document.getElementById('workspace');
    ws.classList.toggle('preview-only');
    this.textContent = ws.classList.contains('preview-only') ? 'Show editor' : 'Preview only';
  });
  document.getElementById('templateSelect').addEventListener('change', function(){
    const key = this.value;
    if (!key) return;
    const t = TEMPLATES[key];
    inputs.html.value = t.html; inputs.css.value = t.css; inputs.js.value = t.js;
    LANGS.forEach(updateGutter);
    charCount.textContent = inputs[currentLang].value.length + ' chars';
    this.value = '';
    runCode();
  });

  let debounceTimer;
  function scheduleRun(){
    if (!autoRunToggle.checked) return;
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(runCode, 450);
  }

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); runCode(); }
  });

  charCount.textContent = inputs.html.value.length + ' chars';
  runCode();
})();
</script>
  <script src="pwa-register.js"></script>
</body>
</html>
