<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b4cff"/>
      <stop offset="100%" stop-color="#3d2ee0"/>
    </linearGradient>
    <linearGradient id="slash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b4cff"/>
      <stop offset="100%" stop-color="#00e5a0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" ry="7" fill="url(#bg)"/>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="32" height="3" rx="2" fill="url(#slash)" opacity="0.9"/>
  <!-- < bracket -->
  <text x="2" y="23" font-family="monospace" font-size="16" font-weight="900" fill="white" opacity="0.95">&lt;</text>
  <!-- > bracket -->
  <text x="19" y="23" font-family="monospace" font-size="16" font-weight="900" fill="white" opacity="0.95">&gt;</text>
  <!-- / slash in accent green -->
  <text x="12" y="23" font-family="monospace" font-size="16" font-weight="900" fill="#00e5a0">/</text>
</svg>
